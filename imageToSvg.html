<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image to SVG Converter</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a1a2e;
      --bg2: #16213e;
      --card: #0f3460;
      --border: #1a3a6a;
      --amber: #f5a623;
      --amber-l: #fbbf24;
      --txt: #e8e8e8;
      --txt2: #b0b0b0;
      --txt3: #707070;
      --teal: #a8e6cf;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: var(--amber);
      margin: 1.5rem 0 0.5rem;
      text-align: center;
    }

    .subtitle {
      color: var(--txt2);
      font-size: 0.8rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      padding: 0 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--bg2);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--amber);
      background: rgba(245, 166, 35, 0.05);
    }
    .drop-zone p { color: var(--txt2); font-size: 0.85rem; margin-top: 0.5rem; }
    .drop-zone .icon { font-size: 2rem; }
    .drop-zone input { display: none; }

    /* Controls */
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      background: var(--bg2);
      padding: 1.2rem;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .control-group label {
      display: block;
      font-size: 0.75rem;
      color: var(--txt2);
      margin-bottom: 0.4rem;
    }
    .control-group input[type="range"] {
      width: 100%;
      accent-color: var(--amber);
    }
    .control-group select {
      width: 100%;
      background: var(--card);
      color: var(--txt);
      border: 1px solid var(--border);
      padding: 0.4rem;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.8rem;
    }
    .val { color: var(--amber); font-weight: 600; float: right; }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.6rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { background: var(--amber); color: #1a1a2e; }
    .btn-primary:hover:not(:disabled) { background: var(--amber-l); }
    .btn-secondary { background: var(--card); color: var(--txt); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { background: var(--border); }

    /* Preview area */
    .preview-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 700px) {
      .preview-row { grid-template-columns: 1fr; }
    }
    .preview-panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 300px;
    }
    .preview-panel h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      color: var(--txt2);
      margin-bottom: 0.8rem;
    }
    .preview-panel .img-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      overflow: hidden;
    }
    .preview-panel img, .preview-panel svg {
      max-width: 100%;
      max-height: 400px;
      object-fit: contain;
    }
    .preview-panel .placeholder {
      color: var(--txt3);
      font-size: 0.8rem;
    }

    /* Status */
    .status {
      font-size: 0.8rem;
      color: var(--txt2);
      text-align: center;
      min-height: 1.2em;
    }
    .status.error { color: #e05c5c; }
    .status.success { color: var(--teal); }

    /* Hidden canvas */
    #workCanvas { display: none; }
  </style>
</head>
<body>
  <h1>Image → SVG Converter</h1>
  <p class="subtitle">Drop an image to vectorize it into scalable SVG</p>

  <div class="container">
    <div class="drop-zone" id="dropZone">
      <div class="icon">📁</div>
      <p>Drop image here or click to browse</p>
      <p>PNG, JPG, GIF, BMP, WebP</p>
      <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="controls">
      <div class="control-group">
        <label>Colors <span class="val" id="colorVal">8</span></label>
        <input type="range" id="colorCount" min="2" max="32" value="8">
      </div>
      <div class="control-group">
        <label>Detail <span class="val" id="detailVal">1.0</span></label>
        <input type="range" id="detailLevel" min="1" max="10" value="5" step="1">
      </div>
      <div class="control-group">
        <label>Smoothing <span class="val" id="smoothVal">50%</span></label>
        <input type="range" id="smoothLevel" min="0" max="100" value="50">
      </div>
      <div class="control-group">
        <label>Max Size (px) <span class="val" id="sizeVal">800</span></label>
        <input type="range" id="maxSize" min="100" max="2000" value="800" step="50">
      </div>
      <div class="control-group">
        <label>Edge Mode</label>
        <select id="edgeMode">
          <option value="color">Color Layers</option>
          <option value="outline">Outline Only</option>
        </select>
      </div>
      <div class="control-group">
        <label>Background</label>
        <select id="bgMode">
          <option value="keep">Keep Background</option>
          <option value="transparent">Transparent</option>
        </select>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="convertBtn" disabled>Convert to SVG</button>
      <button class="btn btn-secondary" id="downloadBtn" disabled>Download SVG</button>
      <button class="btn btn-secondary" id="copySvgBtn" disabled>Copy SVG Code</button>
    </div>

    <div class="status" id="status"></div>

    <div class="preview-row">
      <div class="preview-panel">
        <h3>Original</h3>
        <div class="img-wrap" id="origWrap">
          <span class="placeholder">No image loaded</span>
        </div>
      </div>
      <div class="preview-panel">
        <h3>SVG Output</h3>
        <div class="img-wrap" id="svgWrap">
          <span class="placeholder">Convert to see result</span>
        </div>
      </div>
    </div>
  </div>

  <canvas id="workCanvas"></canvas>

  <script>
    // ── State ──
    let sourceImg = null;
    let svgString = '';

    // ── DOM refs ──
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const colorCount = document.getElementById('colorCount');
    const detailLevel = document.getElementById('detailLevel');
    const smoothLevel = document.getElementById('smoothLevel');
    const maxSize = document.getElementById('maxSize');
    const edgeMode = document.getElementById('edgeMode');
    const bgMode = document.getElementById('bgMode');
    const convertBtn = document.getElementById('convertBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const copySvgBtn = document.getElementById('copySvgBtn');
    const statusEl = document.getElementById('status');
    const origWrap = document.getElementById('origWrap');
    const svgWrap = document.getElementById('svgWrap');
    const canvas = document.getElementById('workCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    // ── Slider labels ──
    colorCount.oninput = () => document.getElementById('colorVal').textContent = colorCount.value;
    detailLevel.oninput = () => {
      const v = (11 - detailLevel.value) / 5;
      document.getElementById('detailVal').textContent = v.toFixed(1);
    };
    smoothLevel.oninput = () => document.getElementById('smoothVal').textContent = smoothLevel.value + '%';
    maxSize.oninput = () => document.getElementById('sizeVal').textContent = maxSize.value;

    // ── File loading ──
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files.length) loadFile(fileInput.files[0]); });

    function loadFile(file) {
      if (!file.type.startsWith('image/')) {
        setStatus('Not a valid image file', 'error');
        return;
      }
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          sourceImg = img;
          origWrap.innerHTML = '';
          origWrap.appendChild(img.cloneNode());
          convertBtn.disabled = false;
          setStatus(`Loaded: ${img.naturalWidth} x ${img.naturalHeight}`, 'success');
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // ── Status helper ──
    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (type ? ' ' + type : '');
    }

    // ── Convert button ──
    convertBtn.addEventListener('click', () => {
      if (!sourceImg) return;
      setStatus('Converting...');
      requestAnimationFrame(() => setTimeout(convert, 20));
    });

    // ══════════════════════════════════════════════════════════════
    // MAIN CONVERSION PIPELINE
    // ══════════════════════════════════════════════════════════════
    function convert() {
      const t0 = performance.now();
      const numColors = parseInt(colorCount.value);
      const detail = (11 - parseInt(detailLevel.value)) / 5;
      const smooth = parseInt(smoothLevel.value) / 100;
      const maxPx = parseInt(maxSize.value);
      const mode = edgeMode.value;
      const removeBg = bgMode.value === 'transparent';

      // Scale image to max size
      let w = sourceImg.naturalWidth, h = sourceImg.naturalHeight;
      const ratio = Math.min(maxPx / w, maxPx / h, 1);
      w = Math.round(w * ratio);
      h = Math.round(h * ratio);

      // Subsample based on detail level
      const sampW = Math.max(16, Math.round(w / detail));
      const sampH = Math.max(16, Math.round(h / detail));

      canvas.width = sampW;
      canvas.height = sampH;
      ctx.drawImage(sourceImg, 0, 0, sampW, sampH);
      const imgData = ctx.getImageData(0, 0, sampW, sampH);
      const pixels = imgData.data;

      // 1) Quantize colors
      const palette = medianCut(pixels, numColors);

      // 2) Map pixels to palette indices
      const indexed = new Uint8Array(sampW * sampH);
      for (let i = 0; i < sampW * sampH; i++) {
        const off = i * 4;
        const pr = pixels[off], pg = pixels[off + 1], pb = pixels[off + 2];
        let bestD = Infinity, bestIdx = 0;
        for (let c = 0; c < palette.length; c++) {
          const dr = pr - palette[c][0], dg = pg - palette[c][1], db = pb - palette[c][2];
          const d = dr * dr + dg * dg + db * db;
          if (d < bestD) { bestD = d; bestIdx = c; }
        }
        indexed[i] = bestIdx;
      }

      // 3) Detect background color (most frequent on image border)
      let bgColorIdx = -1;
      if (removeBg) {
        const borderCount = new Uint32Array(palette.length);
        for (let x = 0; x < sampW; x++) {
          borderCount[indexed[x]]++;
          borderCount[indexed[(sampH - 1) * sampW + x]]++;
        }
        for (let y = 0; y < sampH; y++) {
          borderCount[indexed[y * sampW]]++;
          borderCount[indexed[y * sampW + sampW - 1]]++;
        }
        bgColorIdx = borderCount.indexOf(Math.max(...borderCount));
      }

      // 4) Build SVG paths
      const scaleX = w / sampW;
      const scaleY = h / sampH;
      let paths = '';

      if (mode === 'outline') {
        // Outline mode: all boundary edges as a single path
        const segments = traceAllEdges(indexed, sampW, sampH);
        let d = '';
        for (const [x1, y1, x2, y2] of segments) {
          d += `M${rd(x1 * scaleX)} ${rd(y1 * scaleY)}L${rd(x2 * scaleX)} ${rd(y2 * scaleY)}`;
        }
        if (d) paths += `<path d="${d}" fill="none" stroke="#000" stroke-width="1"/>\n`;
      } else {
        // Color layers: trace each color as filled regions
        for (let c = 0; c < palette.length; c++) {
          if (removeBg && c === bgColorIdx) continue;
          const regions = traceColorContours(indexed, sampW, sampH, c);
          const [cr, cg, cb] = palette[c];
          const hex = '#' + ((1 << 24) + (cr << 16) + (cg << 8) + cb).toString(16).slice(1);
          for (const region of regions) {
            if (region.length < 3) continue;
            // Remove collinear points, then optionally smooth
            let simplified = simplifyContour(region);
            const smoothed = smooth > 0 ? smoothPath(simplified, smooth) : simplified;
            const scaled = smoothed.map(p => [p[0] * scaleX, p[1] * scaleY]);
            paths += `<path d="${buildPathD(scaled, true)}" fill="${hex}" stroke="${hex}" stroke-width="0.5" stroke-linejoin="round"/>\n`;
          }
        }
      }

      svgString = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">\n${paths}</svg>`;
      svgWrap.innerHTML = svgString;
      downloadBtn.disabled = false;
      copySvgBtn.disabled = false;

      const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
      const svgKb = (new Blob([svgString]).size / 1024).toFixed(1);
      setStatus(`Done in ${elapsed}s - ${svgKb} KB - ${palette.length} colors`, 'success');
    }

    // ══════════════════════════════════════════════════════════════
    // MEDIAN CUT COLOR QUANTIZATION
    // ══════════════════════════════════════════════════════════════
    function medianCut(pixels, numColors) {
      const samples = [];
      const totalPixels = pixels.length / 4;
      const step = Math.max(1, Math.floor(totalPixels / 20000));
      for (let i = 0; i < totalPixels; i += step) {
        const off = i * 4;
        samples.push([pixels[off], pixels[off + 1], pixels[off + 2]]);
      }

      let buckets = [samples];
      while (buckets.length < numColors) {
        let bestBi = 0, bestRange = -1, bestCh = 0;
        for (let bi = 0; bi < buckets.length; bi++) {
          const b = buckets[bi];
          if (b.length < 2) continue;
          for (let ch = 0; ch < 3; ch++) {
            let mn = 255, mx = 0;
            for (const s of b) { if (s[ch] < mn) mn = s[ch]; if (s[ch] > mx) mx = s[ch]; }
            if (mx - mn > bestRange) { bestRange = mx - mn; bestBi = bi; bestCh = ch; }
          }
        }
        if (bestRange <= 0) break;
        const bucket = buckets[bestBi];
        bucket.sort((a, b) => a[bestCh] - b[bestCh]);
        const mid = bucket.length >> 1;
        buckets.splice(bestBi, 1, bucket.slice(0, mid), bucket.slice(mid));
      }

      return buckets.map(b => {
        if (!b.length) return [0, 0, 0];
        let tr = 0, tg = 0, tb = 0;
        for (const s of b) { tr += s[0]; tg += s[1]; tb += s[2]; }
        return [Math.round(tr / b.length), Math.round(tg / b.length), Math.round(tb / b.length)];
      });
    }

    // ══════════════════════════════════════════════════════════════
    // CONTOUR TRACING - Pixel Boundary Edge Method
    // ══════════════════════════════════════════════════════════════
    // For each color, collect directed edges along pixel boundaries,
    // then chain them into closed loops using the right-hand rule.

    function traceColorContours(indexed, w, h, colorIdx) {
      function isColor(x, y) {
        return x >= 0 && x < w && y >= 0 && y < h && indexed[y * w + x] === colorIdx;
      }

      // Vertex grid is (w+1) x (h+1). For each vertex, store outgoing
      // directed edge directions as a bitmask.
      // Directions: bit0=right(+x), bit1=down(+y), bit2=left(-x), bit3=up(-y)
      const vw = w + 1, vh = h + 1;
      const outgoing = new Uint8Array(vw * vh);

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          if (!isColor(x, y)) continue;
          // Top edge: vertex(x,y)→vertex(x+1,y) [right] if no color above
          if (!isColor(x, y - 1)) outgoing[y * vw + x] |= 1;
          // Right edge: vertex(x+1,y)→vertex(x+1,y+1) [down] if no color right
          if (!isColor(x + 1, y)) outgoing[y * vw + (x + 1)] |= 2;
          // Bottom edge: vertex(x+1,y+1)→vertex(x,y+1) [left] if no color below
          if (!isColor(x, y + 1)) outgoing[(y + 1) * vw + (x + 1)] |= 4;
          // Left edge: vertex(x,y+1)→vertex(x,y) [up] if no color left
          if (!isColor(x - 1, y)) outgoing[(y + 1) * vw + x] |= 8;
        }
      }

      const DX = [1, 0, -1, 0], DY = [0, 1, 0, -1];
      const contours = [];
      const maxSteps = 4 * w * h + 4;

      for (let vy = 0; vy < vh; vy++) {
        for (let vx = 0; vx < vw; vx++) {
          while (outgoing[vy * vw + vx]) {
            // Find first available start direction
            let dir = -1;
            const avail = outgoing[vy * vw + vx];
            for (let d = 0; d < 4; d++) {
              if (avail & (1 << d)) { dir = d; break; }
            }
            if (dir === -1) break;

            const pts = [];
            let cx = vx, cy = vy;
            const sx = vx, sy = vy;

            for (let step = 0; step < maxSteps; step++) {
              pts.push([cx, cy]);
              // Remove this edge from outgoing
              outgoing[cy * vw + cx] &= ~(1 << dir);
              // Move to next vertex
              cx += DX[dir]; cy += DY[dir];

              if (cx === sx && cy === sy) break; // closed loop

              // Pick next direction: right-hand rule
              // Priority: right turn, straight, left turn, U-turn
              const a = outgoing[cy * vw + cx];
              if (!a) break;
              let nextDir = -1;
              const pri = [(dir + 1) % 4, dir, (dir + 3) % 4, (dir + 2) % 4];
              for (const d of pri) {
                if (a & (1 << d)) { nextDir = d; break; }
              }
              if (nextDir === -1) break;
              dir = nextDir;
            }

            if (pts.length >= 3) contours.push(pts);
          }
        }
      }
      return contours;
    }

    // Remove collinear points from a closed contour
    function simplifyContour(pts) {
      if (pts.length < 3) return pts;
      const n = pts.length;
      const keep = [];
      for (let i = 0; i < n; i++) {
        const prev = pts[(i - 1 + n) % n];
        const curr = pts[i];
        const next = pts[(i + 1) % n];
        // Cross product: non-zero means direction change (corner)
        const cross = (curr[0] - prev[0]) * (next[1] - prev[1])
                    - (curr[1] - prev[1]) * (next[0] - prev[0]);
        if (Math.abs(cross) > 0.001) keep.push(curr);
      }
      return keep.length >= 3 ? keep : pts;
    }

    // ══════════════════════════════════════════════════════════════
    // OUTLINE MODE - All color boundary edges as line segments
    // ══════════════════════════════════════════════════════════════
    function traceAllEdges(indexed, w, h) {
      // Collect all boundary edge segments between differently-colored pixels
      // Return as a single array of [x1,y1,x2,y2] segments
      const segments = [];
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const c = indexed[y * w + x];
          // Vertical edge between (x,y) and (x+1,y) if right neighbor differs
          if (x + 1 < w && indexed[y * w + x + 1] !== c) {
            segments.push([x + 1, y, x + 1, y + 1]);
          }
          // Horizontal edge between (x,y) and (x,y+1) if bottom neighbor differs
          if (y + 1 < h && indexed[(y + 1) * w + x] !== c) {
            segments.push([x, y + 1, x + 1, y + 1]);
          }
        }
      }
      return segments;
    }

    // ══════════════════════════════════════════════════════════════
    // PATH SMOOTHING - Chaikin's corner cutting (closed paths)
    // ══════════════════════════════════════════════════════════════
    function smoothPath(points, amount) {
      if (points.length < 3 || amount === 0) return points;
      // Limit iterations to avoid point count explosion
      const iterations = Math.max(1, Math.min(2, Math.round(amount * 2)));
      let pts = points;
      for (let it = 0; it < iterations; it++) {
        const n = pts.length;
        const newPts = [];
        for (let i = 0; i < n; i++) {
          const p0 = pts[i];
          const p1 = pts[(i + 1) % n];
          newPts.push(
            [0.75 * p0[0] + 0.25 * p1[0], 0.75 * p0[1] + 0.25 * p1[1]],
            [0.25 * p0[0] + 0.75 * p1[0], 0.25 * p0[1] + 0.75 * p1[1]]
          );
        }
        pts = newPts;
      }
      return pts;
    }

    // ══════════════════════════════════════════════════════════════
    // SVG PATH BUILDER
    // ══════════════════════════════════════════════════════════════
    function buildPathD(points, closed) {
      if (!points.length) return '';
      let d = `M${rd(points[0][0])} ${rd(points[0][1])}`;
      for (let i = 1; i < points.length; i++) {
        d += `L${rd(points[i][0])} ${rd(points[i][1])}`;
      }
      if (closed) d += 'Z';
      return d;
    }

    function rd(v) { return Math.round(v * 100) / 100; }

    // ── Download ──
    downloadBtn.addEventListener('click', () => {
      if (!svgString) return;
      const blob = new Blob([svgString], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'vectorized.svg';
      a.click();
      URL.revokeObjectURL(url);
    });

    // ── Copy SVG ──
    copySvgBtn.addEventListener('click', () => {
      if (!svgString) return;
      navigator.clipboard.writeText(svgString).then(
        () => setStatus('SVG code copied to clipboard', 'success'),
        () => setStatus('Failed to copy', 'error')
      );
    });
  </script>
</body>
</html>
