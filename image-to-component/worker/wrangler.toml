name = "converter-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# KV namespace for usage tracking
[[kv_namespaces]]
binding = "USAGE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# After creating your KV namespace, run:
#   wrangler kv namespace create USAGE
# Then paste the id above.

# Environment variables (set secrets via `wrangler secret put <NAME>`):
# - ANTHROPIC_API_KEY    (your Claude API key)
# - GOOGLE_CLIENT_ID     (your Google OAuth client ID)
# - ADMIN_EMAILS         (comma-separated admin emails)
# - STRIPE_SECRET_KEY    (Stripe secret key)
# - STRIPE_WEBHOOK_SECRET (Stripe webhook signing secret)
# - STRIPE_PRICE_ID      (Stripe price ID for the paid plan)

[vars]
FREE_DAILY_LIMIT = "2"
ALLOWED_ORIGINS = "https://sco314.github.io,http://localhost:5173"
